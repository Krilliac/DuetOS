# CustomOS GRUB boot configuration.
#
# Consumed by grub-mkrescue when staging the bootable ISO. GRUB here is
# third-party scaffolding while our own UEFI boot loader doesn't exist.
# Once boot/uefi/ is real, the ISO helper will switch to shipping that
# loader alongside (or instead of) GRUB.

set timeout=3
set default=0

# Desktop boot — GUI with windows, taskbar, cursor. Shell visible
# inside the boot-log pane; Ctrl+Alt+T toggles to fullscreen TTY.
menuentry "CustomOS — Desktop" {
    multiboot2 /boot/customos-kernel.elf boot=desktop
    boot
}

# TTY boot — fullscreen framebuffer console on black. Shell takes
# the whole screen. Ctrl+Alt+T flips back to the windowed desktop.
menuentry "CustomOS — Terminal (TTY)" {
    multiboot2 /boot/customos-kernel.elf boot=tty
    boot
}

# Demo boot — desktop + calendar popup already open. Useful for
# headless screenshots (tools/qemu/screenshot.sh CUSTOMOS_DEMO=1).
menuentry "CustomOS — Desktop (demo widgets)" {
    multiboot2 /boot/customos-kernel.elf boot=desktop demo-calendar=1
    boot
}
