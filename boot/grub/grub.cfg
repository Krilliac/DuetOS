# DuetOS GRUB boot configuration.
#
# Consumed by grub-mkrescue when staging the bootable ISO. GRUB here is
# third-party scaffolding while our own UEFI boot loader doesn't exist.
# Once boot/uefi/ is real, the ISO helper will switch to shipping that
# loader alongside (or instead of) GRUB.

set timeout=10
# Default is the autologin Classic desktop. Users who want a
# login-screen boot can press an arrow key during the timeout to
# select a different entry. The screenshot harness depends on
# this default landing on a composed desktop so screendumps
# capture real chrome instead of the login modal.
set default=5

# Desktop boot — GUI with windows, taskbar, cursor. Classic theme
# (teal / slate blue). Ctrl+Alt+T toggles to fullscreen TTY;
# Ctrl+Alt+Y cycles themes at runtime.
menuentry "DuetOS — Desktop (Classic theme)" {
    multiboot2 /boot/duetos-kernel.elf boot=desktop theme=classic
    boot
}

# Desktop boot with the Slate10 theme — Windows 10 x Unreal Engine
# Slate UI hybrid. Dark charcoal chrome, flat Win10-blue accent,
# Slate amber highlight, Win10-red close button.
menuentry "DuetOS — Desktop (Slate10 theme)" {
    multiboot2 /boot/duetos-kernel.elf boot=desktop theme=slate10
    boot
}

# TTY boot — fullscreen framebuffer console on black. Shell takes
# the whole screen. Ctrl+Alt+T flips back to the windowed desktop.
menuentry "DuetOS — Terminal (TTY)" {
    multiboot2 /boot/duetos-kernel.elf boot=tty
    boot
}

# Demo boot — desktop + calendar popup already open. Useful for
# headless screenshots (tools/qemu/screenshot.sh DUETOS_DEMO=1).
menuentry "DuetOS — Desktop (demo widgets)" {
    multiboot2 /boot/duetos-kernel.elf boot=desktop demo-calendar=1
    boot
}

# Slate10 + demo widgets for the screenshot harness.
menuentry "DuetOS — Desktop Slate10 (demo widgets)" {
    multiboot2 /boot/duetos-kernel.elf boot=desktop theme=slate10 demo-calendar=1
    boot
}

# Screenshot-harness boots — autologin=1 skips the login gate so
# the headless screenshot captures the live desktop directly.
menuentry "DuetOS — Desktop Classic (autologin)" {
    multiboot2 /boot/duetos-kernel.elf boot=desktop theme=classic autologin=1
    boot
}
menuentry "DuetOS — Desktop Slate10 (autologin)" {
    multiboot2 /boot/duetos-kernel.elf boot=desktop theme=slate10 autologin=1
    boot
}

# Red-team boot — self-driving GUI pentest runner. Spawns a kernel
# task that injects keystrokes into the login gate + shell and
# logs each probe's outcome to serial. Ends with `halt`, so this
# entry is for diagnostic runs only.
menuentry "DuetOS — Pentest (GUI attack run)" {
    multiboot2 /boot/duetos-kernel.elf boot=desktop theme=classic pentest=gui
    boot
}

# Amber + Duet desktop entries — appended so existing entry
# indices (the screenshot harness pins them) stay stable.
#
# Amber : single-hue retro CRT tribute (warm amber on near-black).
# Duet  : redesigned palette, slate-charcoal canvas, dual accent
#         (teal = native DuetOS ABI, amber-warm = Win32 PE peer).
menuentry "DuetOS — Desktop (Amber theme)" {
    multiboot2 /boot/duetos-kernel.elf boot=desktop theme=amber
    boot
}
menuentry "DuetOS — Desktop (Duet theme)" {
    multiboot2 /boot/duetos-kernel.elf boot=desktop theme=duet
    boot
}

# Autologin variants for the screenshot harness.
menuentry "DuetOS — Desktop Amber (autologin)" {
    multiboot2 /boot/duetos-kernel.elf boot=desktop theme=amber autologin=1
    boot
}
menuentry "DuetOS — Desktop Duet (autologin)" {
    multiboot2 /boot/duetos-kernel.elf boot=desktop theme=duet autologin=1
    boot
}

# Live Internet probe — DHCP + DNS for www.google.com + TCP HTTP/1.0 GET
# to Google's edge. `netsmoke=force` overrides the IsEmulator gate that
# normally suppresses the probe under QEMU SLIRP. Boots the TTY shell so
# the desktop init doesn't compete for serial output during the probe.
menuentry --id duetos-live-internet "DuetOS — Live Internet (reach google.com)" {
    multiboot2 /boot/duetos-kernel.elf boot=tty netsmoke=force
    boot
}
