# CustomOS GRUB boot configuration.
#
# Consumed by grub-mkrescue when staging the bootable ISO. GRUB here is
# third-party scaffolding while our own UEFI boot loader doesn't exist.
# Once boot/uefi/ is real, the ISO helper will switch to shipping that
# loader alongside (or instead of) GRUB.

set timeout=0
set default=0

menuentry "CustomOS" {
    multiboot2 /boot/customos-kernel.elf
    boot
}
