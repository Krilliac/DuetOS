# duetos-packages CI — validates manifests + signatures on every PR.
#
# On each PR:
#   1. Walk every *.toml in the repo. They must parse.
#   2. Walk every [[packages]] entry in repo.toml. For each
#      one, verify that:
#         a) the referenced binary_url tarball exists in packages/
#         b) its actual SHA-256 matches the manifest's `sha256`
#         c) a sibling `<tarball>.sig` exists
#         d) the signature verifies against keys/official.pub
#            (an Ed25519 PEM public key the repo maintainer
#            committed at repo-init time)
#   3. Reject the PR if any of (a)..(d) fail or if a new
#      package entry was added without a corresponding signature.

name: Validate packages

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-tomli openssl

      - name: Validate every manifest + signature
        run: |
          python3 .github/workflows/validate.py
