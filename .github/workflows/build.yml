# DuetOS CI — x86_64 kernel build + QEMU boot smoke.
#
# Scope (v0):
#   * check-format: enforce clang-format on kernel/ + userland/
#   * build-debug:  freestanding x86_64 kernel, debug preset
#   * build-release: same source, release preset
#   * qemu-smoke:   boot the debug build in QEMU, grep the serial
#                   log for expected boot signatures. Anything
#                   missing (a crash, a #PF that wasn't expected,
#                   a missing "hello-winapi" line) fails the job.
#
# Inspired by SparkEngine's build.yml structure (multi-stage jobs,
# dependency-cached artifacts) but massively trimmed — no sanitizer
# configs (freestanding kernel, no libasan), no multi-OS matrix
# (kernel only builds on Linux hosts today), no coverage (gcov
# doesn't work against ring-0 code). Those land when they make
# sense.

name: build
on:
  push:
    branches: [main, claude/**]
    paths-ignore:
      - '**/*.md'
      - 'LICENSE'
      - '.claude/**'
      - 'docs/**'
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  check-format:
    name: clang-format
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install clang-format
        run: |
          # Retry-with-backoff against transient mirror flakes
          # (pattern lifted from SparkEngine's build.yml).
          for attempt in 1 2 3 4; do
            if sudo apt-get update; then break; fi
            sleep $((attempt * 5))
          done
          sudo apt-get install -y clang-format-18
          sudo ln -sf /usr/bin/clang-format-18 /usr/local/bin/clang-format
      - name: Check format
        run: |
          mapfile -t SRCS < <(find kernel userland \
            \( -name '*.h' -o -name '*.hpp' -o -name '*.c' -o -name '*.cpp' \))
          if [[ ${#SRCS[@]} -eq 0 ]]; then
            echo "No C/C++ sources found"; exit 0
          fi
          clang-format --dry-run --Werror "${SRCS[@]}"

  build-debug:
    name: build debug
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain
        run: |
          for attempt in 1 2 3 4; do
            if sudo apt-get update; then break; fi
            sleep $((attempt * 5))
          done
          sudo apt-get install -y clang-18 lld-18 llvm-18 cmake ninja-build python3 \
                                  grub-common grub-pc-bin grub-efi-amd64-bin xorriso mtools
          sudo ln -sf /usr/bin/clang-18 /usr/local/bin/clang
          sudo ln -sf /usr/bin/clang++-18 /usr/local/bin/clang++
          sudo ln -sf /usr/bin/lld-link-18 /usr/local/bin/lld-link
          sudo ln -sf /usr/bin/llvm-dlltool-18 /usr/local/bin/llvm-dlltool
          sudo ln -sf /usr/bin/ld.lld-18 /usr/local/bin/ld.lld
      - name: Configure
        run: cmake --preset x86_64-debug
      - name: Build
        run: cmake --build build/x86_64-debug --parallel $(nproc)
      - name: Upload kernel
        uses: actions/upload-artifact@v4
        with:
          name: duetos-kernel-debug
          if-no-files-found: error
          path: |
            build/x86_64-debug/duetos.iso
            build/x86_64-debug/kernel/duetos-kernel.elf
          retention-days: 7

  build-release:
    name: build release
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain
        run: |
          for attempt in 1 2 3 4; do
            if sudo apt-get update; then break; fi
            sleep $((attempt * 5))
          done
          sudo apt-get install -y clang-18 lld-18 llvm-18 cmake ninja-build python3 \
                                  grub-common grub-pc-bin grub-efi-amd64-bin xorriso mtools
          sudo ln -sf /usr/bin/clang-18 /usr/local/bin/clang
          sudo ln -sf /usr/bin/clang++-18 /usr/local/bin/clang++
          sudo ln -sf /usr/bin/lld-link-18 /usr/local/bin/lld-link
          sudo ln -sf /usr/bin/llvm-dlltool-18 /usr/local/bin/llvm-dlltool
          sudo ln -sf /usr/bin/ld.lld-18 /usr/local/bin/ld.lld
      - name: Configure
        run: cmake --preset x86_64-release
      - name: Build
        run: cmake --build build/x86_64-release --parallel $(nproc)
      - name: Upload kernel
        uses: actions/upload-artifact@v4
        with:
          name: duetos-kernel-release
          if-no-files-found: error
          path: |
            build/x86_64-release/duetos.iso
            build/x86_64-release/kernel/duetos-kernel.elf
          retention-days: 7

  qemu-smoke:
    # Profile-matrix qemu-smoke. Each profile boots the kernel
    # through bringup-complete, runs ONE focused scenario, prints
    # a [smoke] complete sentinel, and exits QEMU via the
    # isa-debug-exit device. The kernel's smoke=<profile> cmdline
    # arg routes to kernel/test/smoke_profile.cpp's per-profile
    # spawn / sleep / sentinel / TestExit chain. Running profiles
    # in parallel turns the old monolithic 1500s budget into 6 ×
    # ~180s budgets running concurrently — wall-clock for the
    # whole matrix is bound by the slowest profile (pe-winapi),
    # not the sum, and a single hang in one profile no longer
    # masks the rest.
    name: qemu smoke (${{ matrix.profile }})
    needs: build-debug
    runs-on: ubuntu-24.04
    permissions:
      pull-requests: write   # for the PR-comment-on-fail step
      contents: read
    strategy:
      # Don't cancel sibling profiles on first failure — every
      # profile's signal is independently informative. A flaky
      # pe-winkill shouldn't suppress the pe-winapi pass.
      fail-fast: false
      matrix:
        profile:
          - bringup
          - ring3
          - pe-hello
          - pe-winapi
          - pe-winkill
          - linux
    steps:
      - uses: actions/checkout@v4
      - name: Install QEMU + grub
        run: |
          for attempt in 1 2 3 4; do
            if sudo apt-get update; then break; fi
            sleep $((attempt * 5))
          done
          sudo apt-get install -y qemu-system-x86 grub-common grub-pc-bin \
                                  grub-efi-amd64-bin xorriso mtools ovmf
      - name: Enable KVM access (~50× speedup vs TCG)
        run: |
          # GitHub-hosted ubuntu-24.04 runners ship with /dev/kvm
          # exposed but with restrictive permissions (root:kvm 660).
          # The smoke step runs as the unprivileged `runner` user,
          # so without explicit access QEMU silently falls back to
          # TCG. Open up /dev/kvm so QEMU's `accel=kvm:tcg` picks KVM.
          if [[ -e /dev/kvm ]]; then
            sudo chmod 666 /dev/kvm
            ls -l /dev/kvm
            echo "kvm_present=yes"
          else
            echo "kvm_present=no — /dev/kvm not on this runner"
          fi
      - name: Download kernel artifact
        uses: actions/download-artifact@v4
        with:
          name: duetos-kernel-debug
          path: build/x86_64-debug/
      - name: Configure
        run: cmake --preset x86_64-debug
      - name: Boot profile + assert signatures (with flake retry)
        id: smoke
        shell: bash
        run: |
          # profile-boot-smoke.sh runs ONE smoke profile and exits:
          #   0 = pass, 1 = regression, 2 = env skip, 3 = flake.
          # Retry on flake (exit 3) up to twice; regression fails
          # immediately. Each profile's ISO is regenerated from a
          # per-profile grub.cfg by tools/qemu/run.sh. Per-profile
          # wall budget is 240s — generous on the observed ~30:1
          # wall:guest ratio for ~8s of guest-time scenarios.
          set +e
          attempts=3
          rc=0
          status=""
          for i in $(seq 1 ${attempts}); do
            echo "::group::smoke profile=${{ matrix.profile }} attempt ${i}/${attempts}"
            DUETOS_TIMEOUT=240 \
              tools/test/profile-boot-smoke.sh "${{ matrix.profile }}" build/x86_64-debug
            rc=$?
            echo "::endgroup::"
            cp -f "build/x86_64-debug/smoke-${{ matrix.profile }}.log" \
                  "smoke-${{ matrix.profile }}-attempt-${i}.log" 2>/dev/null || true
            if [[ $rc -eq 0 ]]; then
              status="pass"; break
            fi
            if [[ $rc -eq 1 ]]; then
              status="regression"; break
            fi
            if [[ $rc -eq 2 ]]; then
              status="skip"; break
            fi
            status="flaky"
            if [[ $i -lt ${attempts} ]]; then
              echo "::warning::Smoke ${{ matrix.profile }} attempt ${i} flaked; retrying..."
              sleep 2
              continue
            fi
          done
          echo "rc=${rc}"          >> "$GITHUB_OUTPUT"
          echo "status=${status}"  >> "$GITHUB_OUTPUT"
          if [[ "${status}" == "skip" ]]; then
            echo "::warning::QEMU not available; smoke test skipped."
            exit 0
          fi
          if [[ "${status}" == "pass" ]]; then exit 0; fi
          exit 1
      - name: Upload serial logs (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: qemu-serial-log-${{ matrix.profile }}
          path: |
            smoke-${{ matrix.profile }}-attempt-*.log
            build/x86_64-debug/smoke-${{ matrix.profile }}.log
          retention-days: 7
          if-no-files-found: ignore
      - name: Comment on PR (sticky, per profile)
        # `always()` so the comment can be updated to "passed"
        # after a previous run wrote a failure comment. Each
        # profile gets its own marker so failures in different
        # profiles don't overwrite each other's diagnostics.
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const profile = '${{ matrix.profile }}';
            const MARKER = `<!-- duetos-qemu-smoke-report-${profile} -->`;
            const status = '${{ steps.smoke.outputs.status }}' || 'unknown';
            const rc = '${{ steps.smoke.outputs.rc }}' || '?';
            const run = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const sha = context.payload.pull_request?.head?.sha?.slice(0, 7) || context.sha.slice(0, 7);

            const { data: comments } = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });
            const existing = comments.find(c => c.body && c.body.includes(MARKER));
            if (status === 'pass' && !existing) return;

            const candidates = [
              `smoke-${profile}-attempt-3.log`,
              `smoke-${profile}-attempt-2.log`,
              `smoke-${profile}-attempt-1.log`,
              `build/x86_64-debug/smoke-${profile}.log`,
            ];
            let tail = '(no serial log captured)';
            for (const p of candidates) {
              if (fs.existsSync(p)) {
                const lines = fs.readFileSync(p, 'utf8').trim().split('\n');
                tail = lines.slice(-40).join('\n');
                break;
              }
            }

            const verdict = {
              pass:       `:white_check_mark: **qemu-smoke (${profile}) passed** for \`${sha}\`.`,
              regression: `:x: **Regression in qemu-smoke (${profile})** — an expected signature is missing or a forbidden one appeared (\`${sha}\`).`,
              flaky:      `:warning: **Flaky qemu-smoke (${profile})** — kernel reached the smoke scope then crashed; retried 3 times (\`${sha}\`).`,
              skip:       `:information_source: **qemu-smoke (${profile}) skipped** — QEMU not available.`,
            }[status] || `:question: qemu-smoke (${profile}) exited rc=${rc} (status=${status}).`;

            const bodyParts = [MARKER, '', `## qemu-smoke — \`${profile}\``, '', verdict, '', `[View full run](${run})`];
            if (status !== 'pass') {
              bodyParts.push('', '<details><summary>Last 40 lines of serial log</summary>', '', '```', tail, '```', '', '</details>');
            }
            const body = bodyParts.join('\n');

            if (existing) {
              await github.rest.issues.updateComment({
                comment_id: existing.id,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              });
            }

  clang-tidy:
    name: clang-tidy (advisory)
    runs-on: ubuntu-24.04
    continue-on-error: true
    needs: build-debug
    steps:
      - uses: actions/checkout@v4
      - name: Install tidy
        run: |
          for attempt in 1 2 3 4; do
            if sudo apt-get update; then break; fi
            sleep $((attempt * 5))
          done
          sudo apt-get install -y clang-tidy-18 clang-18 cmake ninja-build
          sudo ln -sf /usr/bin/clang-tidy-18 /usr/local/bin/clang-tidy
      - name: Configure (for compile_commands.json)
        run: cmake --preset x86_64-debug -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
      - name: Run clang-tidy
        run: |
          # Advisory pass on the first 30 .cpp files only — a full
          # run on a freestanding kernel produces a lot of
          # false-positive noise. Surface the signal early, don't
          # fail the build.
          find kernel -name '*.cpp' | head -30 | while read f; do
            clang-tidy -p build/x86_64-debug "$f" --quiet 2>&1 || true
          done | head -200

  host-tests:
    # Hosted unit tests under tests/host/ — built with the runner's
    # system clang/g++ + glibc, not the kernel freestanding
    # toolchain. Scope today is arch-neutral header-only kernel TUs
    # (Result<T,E>, freestanding string primitives); scope expands
    # over time as more kernel TUs grow `#ifdef DUETOS_HOST_TEST`
    # shims around hardware accessors. Compared with qemu-smoke,
    # these tests run in ms, are parallelisable, work under ASan +
    # UBSan, and can't hide regressions behind a "kernel got slow"
    # excuse. They're a faster signal that complements the boot
    # smoke matrix; both are required before merge.
    name: host tests
    runs-on: ubuntu-24.04
    needs: []
    steps:
      - uses: actions/checkout@v4
      - name: Install host toolchain
        run: |
          for attempt in 1 2 3 4; do
            if sudo apt-get update; then break; fi
            sleep $((attempt * 5))
          done
          sudo apt-get install -y clang-18 cmake ninja-build
          sudo ln -sf /usr/bin/clang-18 /usr/local/bin/clang
          sudo ln -sf /usr/bin/clang++-18 /usr/local/bin/clang++
      - name: Configure (host-tests, ASan + UBSan)
        run: cmake -S tests/host -B build/host-tests -G Ninja
      - name: Build
        run: cmake --build build/host-tests --parallel $(nproc)
      - name: Test
        run: ctest --test-dir build/host-tests --output-on-failure --parallel $(nproc)

  publish-rolling:
    # Refresh the latest-debug / latest-release rolling channels on every
    # push to main. The README's download badges read off these tags;
    # without this job they'd stay empty until someone pushes a v* tag
    # (which release.yml handles separately and overwrites these).
    name: publish rolling channels
    runs-on: ubuntu-24.04
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [check-format, build-debug, build-release, qemu-smoke, host-tests]
    permissions:
      contents: write
    steps:
      - name: Download debug artifact
        uses: actions/download-artifact@v4
        with:
          name: duetos-kernel-debug
          path: dist/debug-raw
      - name: Download release artifact
        uses: actions/download-artifact@v4
        with:
          name: duetos-kernel-release
          path: dist/release-raw
      - name: Stage assets
        run: |
          set -euo pipefail
          mkdir -p dist/debug dist/release
          cp dist/debug-raw/duetos.iso dist/debug/duetos-debug.iso
          cp dist/debug-raw/kernel/duetos-kernel.elf dist/debug/duetos-kernel-debug.elf
          ( cd dist/debug && sha256sum duetos-debug.iso duetos-kernel-debug.elf > SHA256SUMS.txt )
          cp dist/release-raw/duetos.iso dist/release/duetos-release.iso
          cp dist/release-raw/kernel/duetos-kernel.elf dist/release/duetos-kernel-release.elf
          ( cd dist/release && sha256sum duetos-release.iso duetos-kernel-release.elf > SHA256SUMS.txt )
      - name: Publish debug channel
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-debug
          target_commitish: ${{ github.sha }}
          name: DuetOS Debug (rolling, ${{ github.sha }})
          body: |
            Rolling debug channel build from `main` @ ${{ github.sha }}.
          prerelease: true
          make_latest: false
          fail_on_unmatched_files: true
          overwrite_files: true
          files: |
            dist/debug/duetos-debug.iso
            dist/debug/duetos-kernel-debug.elf
            dist/debug/SHA256SUMS.txt
      - name: Publish release channel
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-release
          target_commitish: ${{ github.sha }}
          name: DuetOS Release (rolling, ${{ github.sha }})
          body: |
            Rolling release channel build from `main` @ ${{ github.sha }}.
          prerelease: false
          make_latest: true
          fail_on_unmatched_files: true
          overwrite_files: true
          files: |
            dist/release/duetos-release.iso
            dist/release/duetos-kernel-release.elf
            dist/release/SHA256SUMS.txt
