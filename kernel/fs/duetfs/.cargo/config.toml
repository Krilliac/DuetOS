# DuetFS cargo config.
#
# Pinned target + build-std flags for the bare-metal kernel build.
# Selecting `x86_64-unknown-none` here means a developer can `cargo
# build --release` from this crate's directory without remembering
# the flag soup; the CMake leaf target passes the same flags
# explicitly so the build doesn't depend on this file.

[build]
target = "x86_64-unknown-none"

[unstable]
build-std         = ["core", "alloc"]
build-std-features = ["compiler-builtins-mem"]
